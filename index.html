<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hi Rozhik:)) 🌻</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Tahoma, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #dff3e3, #eef9e8);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 620px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(54, 92, 64, 0.12);
      text-align: center;
      position: relative;
      overflow: visible;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      color: #35624a;
    }

    p {
      color: #466152;
      line-height: 1.9;
      margin: 0;
    }

    .buttons {
      position: relative;
      height: 170px;
      margin-top: 28px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 24px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    #yesBtn {
      background: #5ea36e;
      color: white;
      margin-left: 12px;
    }

    #yesBtn:hover,
    .submit-btn:hover,
    .date-display:hover {
      transform: scale(1.02);
    }

    #noBtn {
      background: #edf3ee;
      color: #355441;
      position: absolute;
      top: 20px;
      right: 40px;
    }

    .hidden {
      display: none;
    }

    form {
      text-align: right;
      margin-top: 22px;
    }

    label {
      display: block;
      margin: 16px 0 8px;
      color: #355441;
      font-weight: bold;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #cfe0d2;
      border-radius: 12px;
      font-size: 1rem;
      background: #fbfefb;
      color: #23402d;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    .date-picker {
      position: relative;
    }

    .date-display {
      width: 100%;
      padding: 12px;
      border: 1px solid #cfe0d2;
      border-radius: 12px;
      font-size: 1rem;
      background: #fbfefb;
      color: #23402d;
      text-align: right;
      cursor: pointer;
    }

    .calendar {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: 100%;
      background: #ffffff;
      border: 1px solid #d7e7da;
      border-radius: 18px;
      box-shadow: 0 16px 35px rgba(54, 92, 64, 0.14);
      padding: 16px;
      z-index: 20;
    }

    .calendar-header {
      text-align: center;
      font-weight: bold;
      color: #35624a;
      margin-bottom: 14px;
    }

    .weekdays,
    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .weekdays div {
      text-align: center;
      font-size: 0.9rem;
      color: #567662;
      padding-bottom: 4px;
    }

    .day-btn,
    .empty-day {
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
    }

    .empty-day {
      visibility: hidden;
    }

    .day-btn {
      background: #f3faf4;
      color: #2f5640;
      border: 1px solid transparent;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .day-btn:hover {
      background: #dff0e2;
    }

    .day-btn.selected {
      background: #5ea36e;
      color: #fff;
    }

    .submit-btn {
      width: 100%;
      margin-top: 20px;
      background: #4c8a5c;
      color: white;
      font-weight: bold;
    }

    .result {
      margin-top: 20px;
      background: #eef8f0;
      border-radius: 16px;
      padding: 18px;
      color: #2f5640;
      text-align: right;
      line-height: 1.9;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 1.7rem;
      }

      .card {
        padding: 22px;
      }

      .buttons {
        height: 190px;
      }

      .weekdays div,
      .day-btn,
      .empty-day {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="questionStep">
      <h1>Hi Rozhik:)) 🌻</h1>
      <p>میای بریم دیت؟</p>
      <div class="buttons" id="buttonsArea">
        <button id="yesBtn" type="button">بله</button>
        <button id="noBtn" type="button">خیر</button>
      </div>
    </div>

    <div id="formStep" class="hidden">
      <p>جزئیات دیت رو بچین</p>

      <form id="dateForm" action="https://formspree.io/f/xvzjoyqv" method="POST">
        <input type="hidden" id="selectedDateInput" name="date" />

        <label for="dateDisplay">چه روزی بریم؟</label>
        <div class="date-picker">
          <button type="button" id="dateDisplay" class="date-display">روز را انتخاب کن</button>

          <div id="calendar" class="calendar hidden">
            <div class="calendar-header">تیر 1405</div>

            <div class="weekdays">
              <div>شنبه</div>
              <div>یکشنبه</div>
              <div>دوشنبه</div>
              <div>سه‌شنبه</div>
              <div>چهارشنبه</div>
              <div>پنجشنبه</div>
              <div>جمعه</div>
            </div>

            <div id="daysGrid" class="days-grid"></div>
          </div>
        </div>

        <label for="place">کجا بریم؟</label>
        <input
          type="text"
          id="place"
          name="place"
          placeholder="مثلاً کافه کژوال، کافه لب آب یا مادی (اینقد نیومدی بریم که جریان آب بستن:()، قدم زدن، یا هر چیز دیگه‌ای"
          required
        />

        <label for="plan">دوست داری چیکار کنیم؟</label>
        <select id="plan" name="plan" required>
          <option value="">انتخاب کن</option>
          <option value="coffee">کافی بخوریم</option>
          <option value="dinner">شام بخوریم</option>
          <option value="both">اول کافی بخوریم بعدش شام</option>
          <option value="custom">یه چیزی که خودت میگی</option>
        </select>

        <div id="foodQuestionWrap" class="hidden">
          <label for="foodAnswer" id="foodQuestionLabel"></label>
          <input type="text" id="foodAnswer" name="food" />
        </div>

        <label for="note">اگه چیزی هم خودت دوست داری بنویس</label>
        <textarea
          id="note"
          name="note"
          placeholder="مثلاً ماشین‌گردی، یه جای آروم، پیاده‌روی، یا هر چیز دیگه‌ای که دوست داری..."
        ></textarea>

        <button type="submit" class="submit-btn">برو تا بریم :)</button>
      </form>

      <div id="result" class="result hidden"></div>
    </div>
  </div>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const buttonsArea = document.getElementById("buttonsArea");
    const questionStep = document.getElementById("questionStep");
    const formStep = document.getElementById("formStep");
    const form = document.getElementById("dateForm");
    const result = document.getElementById("result");

    const planSelect = document.getElementById("plan");
    const foodQuestionWrap = document.getElementById("foodQuestionWrap");
    const foodQuestionLabel = document.getElementById("foodQuestionLabel");
    const foodAnswer = document.getElementById("foodAnswer");

    const dateDisplay = document.getElementById("dateDisplay");
    const calendar = document.getElementById("calendar");
    const daysGrid = document.getElementById("daysGrid");
    const selectedDateInput = document.getElementById("selectedDateInput");

    let selectedDay = "";

    function renderCalendar() {
      const startOffset = 2;
      daysGrid.innerHTML = "";

      for (let i = 0; i < startOffset; i += 1) {
        const emptyCell = document.createElement("div");
        emptyCell.className = "empty-day";
        daysGrid.appendChild(emptyCell);
      }

      for (let day = 1; day <= 31; day += 1) {
        const dayButton = document.createElement("button");
        dayButton.type = "button";
        dayButton.className = "day-btn";
        dayButton.textContent = day;

        if (String(day) === selectedDay) {
          dayButton.classList.add("selected");
        }

        dayButton.addEventListener("click", function () {
          selectedDay = String(day);
          dateDisplay.textContent = day + " تیر 1405";
          selectedDateInput.value = day + " تیر 1405";
          calendar.classList.add("hidden");
          renderCalendar();
        });

        daysGrid.appendChild(dayButton);
      }
    }

    function moveNoButton() {
      const areaRect = buttonsArea.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();

      const maxX = Math.max(0, areaRect.width - btnRect.width);
      const maxY = Math.max(0, areaRect.height - btnRect.height);

      const randomX = Math.floor(Math.random() * (maxX + 1));
      const randomY = Math.floor(Math.random() * (maxY + 1));

      noBtn.style.right = "auto";
      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";
    }

    function updatePlanQuestion() {
      const value = planSelect.value;

      foodQuestionWrap.classList.add("hidden");
      foodAnswer.required = false;
      foodAnswer.value = "";

      if (value === "coffee") {
        foodQuestionWrap.classList.remove("hidden");
        foodQuestionLabel.textContent = "کافی چی بخوریم؟";
        foodAnswer.placeholder = "مثلاً لته، آمریکانو، هات‌چاکلت...";
        foodAnswer.required = true;
      } else if (value === "dinner") {
        foodQuestionWrap.classList.remove("hidden");
        foodQuestionLabel.textContent = "شام چی بخوریم؟";
        foodAnswer.placeholder = "مثلاً پاستا، برگر، پیتزا...";
        foodAnswer.required = true;
      } else if (value === "both" || value === "custom") {
        foodQuestionWrap.classList.remove("hidden");
        foodQuestionLabel.textContent = "خودت بنویس چی بخوریم";
        foodAnswer.placeholder = "مثلاً اول لته بعدش پیتزا";
        foodAnswer.required = true;
      }
    }

    noBtn.addEventListener("mouseenter", moveNoButton);
    noBtn.addEventListener("pointerdown", function (e) {
      e.preventDefault();
      moveNoButton();
    });
    noBtn.addEventListener("click", function (e) {
      e.preventDefault();
      moveNoButton();
    });
    noBtn.addEventListener(
      "touchstart",
      function (e) {
        e.preventDefault();
        moveNoButton();
      },
      { passive: false }
    );

    yesBtn.addEventListener("click", function () {
      questionStep.classList.add("hidden");
      formStep.classList.remove("hidden");
    });

    dateDisplay.addEventListener("click", function () {
      calendar.classList.toggle("hidden");
    });

    document.addEventListener("click", function (e) {
      if (!e.target.closest(".date-picker")) {
        calendar.classList.add("hidden");
      }
    });

    planSelect.addEventListener("change", updatePlanQuestion);

    form.addEventListener("submit", function (e) {
      if (!selectedDay) {
        e.preventDefault();
        dateDisplay.textContent = "لطفاً روز را انتخاب کن";
        return;
      }

      selectedDateInput.value = selectedDay + " تیر 1405";

      const place = document.getElementById("place").value.trim();
      const planValue = planSelect.value;
      const note = document.getElementById("note").value.trim();

      const planTextMap = {
        coffee: "کافی بخوریم",
        dinner: "شام بخوریم",
        both: "اول کافی بخوریم بعدش شام",
        custom: "یه چیزی که خودت میگی"
      };

      const extraFoodText =
        foodQuestionWrap.classList.contains("hidden") || !foodAnswer.value.trim()
          ? "نداره"
          : foodAnswer.value.trim();

      result.classList.remove("hidden");
      result.innerHTML = `
        <strong>در حال ارسال برنامه :)</strong><br><br>
        <strong>روز:</strong> ${selectedDay} تیر 1405<br>
        <strong>جا:</strong> ${place}<br>
        <strong>برنامه:</strong> ${planTextMap[planValue]}<br>
        <strong>چی بخوریم:</strong> ${extraFoodText}<br>
        <strong>توضیحات:</strong> ${note || "نداره"}
      `;
    });

    renderCalendar();
    setTimeout(moveNoButton, 300);
  </script>
</body>
</html>
