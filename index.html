<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rozhan Date</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Tahoma, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #dff3e3, #eef9e8);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 620px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(54, 92, 64, 0.12);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      color: #35624a;
    }

    p {
      color: #466152;
      line-height: 1.9;
      margin: 0;
    }

    .buttons {
      position: relative;
      height: 170px;
      margin-top: 28px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 24px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    #yesBtn {
      background: #5ea36e;
      color: white;
      margin-left: 12px;
    }

    #yesBtn:hover,
    .submit-btn:hover,
    .date-display:hover {
      transform: scale(1.02);
    }

    #noBtn {
      background: #edf3ee;
      color: #355441;
      position: absolute;
      top: 20px;
      right: 40px;
    }

    .hidden {
      display: none;
    }

    form {
      text-align: right;
      margin-top: 22px;
    }

    label {
      display: block;
      margin: 16px 0 8px;
      color: #355441;
      font-weight: bold;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #cfe0d2;
      border-radius: 12px;
      font-size: 1rem;
      background: #fbfefb;
      color: #23402d;
