<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rozhan Date</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #eef9ee, #dff4e5);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #365c40;
    }

    .card {
      width: 100%;
      max-width: 620px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(54, 92, 64, 0.12);
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 2rem;
      color: #365c40;
    }

    p {
      line-height: 1.8;
      color: #5b7563;
    }

    .hidden {
      display: none !important;
    }

    .step {
      width: 100%;
    }

    .buttons {
      position: relative;
      height: 210px;
      margin-top: 24px;
    }

    .btn {
      border: none;
      border-radius: 16px;
      padding: 16px 22px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
      font-family: inherit;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-yes {
      background: #4f8f5b;
      color: #fff;
      width: 100%;
      margin-top: 24px;
    }

    .btn-no {
      position: absolute;
      background: #f2f6f3;
      color: #365c40;
      border: 1px solid #d7e7da;
      min-width: 120px;
    }

    .form-group {
      margin-bottom: 18px;
      text-align: right;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 1.5rem;
      font-weight: 700;
      color: #365c40;
    }

    .hint {
      margin: 0 0 10px;
      font-size: 0.95rem;
      color: #7a9481;
    }

    input,
    textarea,
    select,
    .date-display {
      width: 100%;
      border: 1px solid #d7e7da;
      border-radius: 18px;
      padding: 16px 18px;
      font-size: 1.1rem;
      font-family: inherit;
      background: #fff;
      color: #365c40;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 120px;
    }

    .date-picker {
      position: relative;
    }

    .date-display {
      text-align: right;
      cursor: pointer;
    }

    .calendar {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: 100%;
      background: #ffffff;
      border: 1px solid #d7e7da;
      border-radius: 18px;
      box-shadow: 0 16px 35px rgba(54, 92, 64, 0.14);
      padding: 16px;
      z-index: 20;
    }

    .calendar-header {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 14px;
      color: #365c40;
    }

    .weekdays,
    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 8px;
    }

    .weekdays {
      margin-bottom: 10px;
    }

    .weekdays div {
      text-align: center;
      font-size: 0.92rem;
      color: #5f7a66;
      white-space: nowrap;
    }

    .day-btn,
    .empty-day {
      min-width: 0;
      border-radius: 14px;
      padding: 12px 0;
      text-align: center;
    }

    .empty-day {
      background: #f6faf7;
    }

    .day-btn {
      border: none;
      background: #f3faf5;
      color: #365c40;
      font-size: 1rem;
      cursor: pointer;
      font-family: inherit;
    }

    .day-btn.selected {
      background: #4f8f5b;
      color: #fff;
    }

    .success-message {
      font-size: 1.15rem;
      color: #365c40;
      line-height: 1.9;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      h1 {
        font-size: 1.7rem;
      }

      .card {
        padding: 22px;
        border-radius: 22px;
        overflow: hidden;
      }

      label {
        font-size: 1.1rem;
      }

      .buttons {
        height: 190px;
      }

      .calendar {
        right: 0;
        left: 0;
        width: 100%;
        padding: 12px;
      }

      .weekdays,
      .days-grid {
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 6px;
      }

      .weekdays div,
      .day-btn,
      .empty-day {
        font-size: 0.78rem;
      }

      .day-btn,
      .empty-day {
        padding: 10px 0;
      }

      input,
      textarea,
      select,
      .date-display {
        font-size: 1rem;
        padding: 14px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <section id="questionStep" class="step">
      <h1>Salam Rozhan 🌻</h1>
      <p>با من دیت میای؟</p>

      <div class="buttons" id="buttonsBox">
        <button id="yesBtn" class="btn btn-yes" type="button">آره بریم :)</button>
        <button id="noBtn" class="btn btn-no" type="button">نه</button>
      </div>
    </section>

    <section id="formStep" class="step hidden">
      <h1>جزئیات دیت رو بچین</h1>

      <form id="dateForm" action="https://formspree.io/f/mdarjapv" method="POST">
        <div class="form-group">
          <label for="dateDisplay">چه روزی بریم؟</label>
          <div class="date-picker">
            <button type="button" id="dateDisplay" class="date-display">روز را انتخاب کن</button>

            <div id="calendar" class="calendar hidden">
              <div class="calendar-header">تیر 1405</div>

              <div class="weekdays">
                <div>شنبه</div>
                <div>یکشنبه</div>
                <div>دوشنبه</div>
                <div>سه‌شنبه</div>
                <div>چهارشنبه</div>
                <div>پنجشنبه</div>
                <div>جمعه</div>
              </div>

              <div id="daysGrid" class="days-grid"></div>
            </div>
          </div>
          <input type="hidden" name="selected_date" id="selectedDateInput" />
        </div>

        <div class="form-group">
          <label for="placeInput">کجا بریم؟</label>
          <p class="hint">مثلا کافه گوزال، کافه لب آب، یه جایی بریم بازی کنیم یا ...</p>
          <input
            type="text"
            id="placeInput"
            name="place"
            placeholder="مثلا کافه گوزال، کافه لب آب، یه جایی بریم بازی کنیم"
            required
          />
        </div>

        <div class="form-group">
          <label for="activityInput">دوست داری چیکار کنیم؟</label>
          <textarea
            id="activityInput"
            name="activity"
            placeholder="مثلا حرف بزنیم، قدم بزنیم، بازی کنیم، قهوه بخوریم..."
            required
          ></textarea>
        </div>

        <button class="btn btn-yes" type="submit">برو تا بریم :)</button>
      </form>
    </section>

    <section id="successStep" class="step hidden">
      <h1>ثبت شد</h1>
      <p class="success-message">همه چیز ثبت شد. منتظر می‌مونم ببینم چه برنامه‌ای چیدی.</p>
    </section>
  </div>

  <script>
    const questionStep = document.getElementById("questionStep");
    const formStep = document.getElementById("formStep");
    const successStep = document.getElementById("successStep");
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const buttonsBox = document.getElementById("buttonsBox");
    const dateDisplay = document.getElementById("dateDisplay");
    const calendar = document.getElementById("calendar");
    const daysGrid = document.getElementById("daysGrid");
    const selectedDateInput = document.getElementById("selectedDateInput");
    const dateForm = document.getElementById("dateForm");

    let selectedDay = "";

    function placeNoButtonRandomly() {
      const boxRect = buttonsBox.getBoundingClientRect();
      const btnRect = noBtn.getBoundingClientRect();

      const maxX = Math.max(0, boxRect.width - btnRect.width);
      const maxY = Math.max(0, boxRect.height - btnRect.height);

      const randomX = Math.floor(Math.random() * maxX);
      const randomY = Math.floor(Math.random() * maxY);

      noBtn.style.right = "auto";
      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";
    }

    function renderCalendar() {
      const startOffset = 2;
      daysGrid.innerHTML = "";

      for (let i = 0; i < startOffset; i += 1) {
        const emptyCell = document.createElement("div");
        emptyCell.className = "empty-day";
        daysGrid.appendChild(emptyCell);
      }

      for (let day = 1; day <= 31; day += 1) {
        const dayButton = document.createElement("button");
        dayButton.type = "button";
        dayButton.className = "day-btn";
        dayButton.textContent = day;

        if (String(day) === selectedDay) {
          dayButton.classList.add("selected");
        }

        dayButton.addEventListener("click", function () {
          selectedDay = String(day);
          dateDisplay.textContent = day + " تیر 1405";
          selectedDateInput.value = day + " تیر 1405";
          calendar.classList.add("hidden");
          renderCalendar();
        });

        daysGrid.appendChild(dayButton);
      }
    }

    yesBtn.addEventListener("click", function () {
      questionStep.classList.add("hidden");
      formStep.classList.remove("hidden");
    });

    noBtn.addEventListener("mouseenter", placeNoButtonRandomly);
    noBtn.addEventListener("click", placeNoButtonRandomly);
    noBtn.addEventListener("touchstart", function (event) {
      event.preventDefault();
      placeNoButtonRandomly();
    }, { passive: false });

    dateDisplay.addEventListener("click", function () {
      calendar.classList.toggle("hidden");
    });

    document.addEventListener("click", function (event) {
      if (!event.target.closest(".date-picker")) {
        calendar.classList.add("hidden");
      }
    });

    dateForm.addEventListener("submit", async function (event) {
      event.preventDefault();

      const formData = new FormData(dateForm);

      try {
        const response = await fetch(dateForm.action, {
          method: "POST",
          body: formData,
          headers: {
            Accept: "application/json"
          }
        });

        if (response.ok) {
          formStep.classList.add("hidden");
          successStep.classList.remove("hidden");
          dateForm.reset();
          selectedDay = "";
          selectedDateInput.value = "";
          dateDisplay.textContent = "روز را انتخاب کن";
          renderCalendar();
        } else {
          alert("ارسال انجام نشد. دوباره امتحان کن.");
        }
      } catch (error) {
        alert("مشکل در اتصال. دوباره امتحان کن.");
      }
    });

    renderCalendar();
    placeNoButtonRandomly();
  </script>
</body>
</html>
