<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rozhan Date</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Tahoma, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #dff3e3, #eef9e8);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 620px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 45px rgba(54, 92, 64, 0.12);
      text-align: center;
      position: relative;
      overflow: visible;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      color: #35624a;
    }

    p {
      color: #466152;
      line-height: 1.9;
      margin: 0;
    }

    .buttons {
      position: relative;
      height: 170px;
      margin-top: 28px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 14px 24px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    #yesBtn {
      background: #5ea36e;
      color: white;
      margin-left: 12px;
    }

    #yesBtn:hover,
    .submit-btn:hover,
    .date-display:hover {
      transform: scale(1.02);
    }

    #noBtn {
      background: #edf3ee;
      color: #355441;
      position: absolute;
      top: 20px;
      right: 40px;
    }

    .hidden {
      display: none;
    }

    form {
      text-align: right;
      margin-top: 22px;
    }

    label {
      display: block;
      margin: 16px 0 8px;
      color: #355441;
      font-weight: bold;
    }

    .place-hint {
      margin: -2px 0 10px;
      font-size: 0.95rem;
      color: #5a7464;
      text-align: right;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid #cfe0d2;
      border-radius: 12px;
      font-size: 1rem;
      background: #fbfefb;
      color: #23402d;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    .date-picker {
      position: relative;
    }

    .date-display {
      width: 100%;
      padding: 12px;
      border: 1px solid #cfe0d2;
      border-radius: 12px;
      font-size: 1rem;
      background: #fbfefb;
      color: #23402d;
      text-align: right;
      cursor: pointer;
    }

    .calendar {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: 100%;
      background: #ffffff;
      border: 1px solid #d7e7da;
      border-radius: 18px;
      box-shadow: 0 16px 35px rgba(54, 92, 64, 0.14);
      padding: 16px;
      z-index: 20;
    }

    .calendar-header {
      text-align: center;
      font-weight: bold;
      color: #35624a;
      margin-bottom: 14px;
    }

    .weekdays,
    .days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .weekdays div {
      text-align: center;
      font-size: 0.9rem;
      color: #567662;
      padding-bottom: 4px;
    }

    .day-btn,
    .empty-day {
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
    }

    .empty-day {
      visibility: hidden;
    }

    .day-btn {
      background: #f3faf4;
      color: #2f5640;
      border: 1px solid transparent;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .day-btn:hover {
      background: #dff0e2;
    }

    .day-btn.selected {
      background: #5ea36e;
      color: #fff;
    }

    .submit-btn {
      width: 100%;
      margin-top: 20px;
      background: #4c8a5c;
      color: white;
      font-weight: bold;
    }

    .result {
      margin-top: 20px;
      background: #eef8f0;
      border-radius: 16px;
      padding: 18px;
      color: #2f5640;
      text-align: right;
      line-height: 1.9;
    }

    @media (max-width: 640px) {
      h1 {
        font-size: 1.7rem;
      }

      .card {
        padding: 22px;
      }

      .buttons {
        height: 190px;
      }

      .weekdays,
      .days-grid {
        gap: 6px;
      }

      .weekdays div,
      .day-btn,
      .empty-day {
        font-size: 0.8rem;
      }

      .day-btn,
      .empty-day {
        height: 34px;
        min-width: 0;
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div id="questionStep">
      <h1>🌻 Salam Rozhan 🌻</h1>
      <p>میای بریم دیت؟ (دیت به مناسبت روز دختر برای دختر خوشگله)</p>

      <div class="buttons" id="buttonsArea">
        <button id="yesBtn" type="button">بله</button>
        <button id="noBtn" type="button">خیر</button>
      </div>
    </div>

    <div id="formStep" class="hidden">
      <p>جزئیات دیت رو بچین</p>

      <form id="dateForm" action="https://formspree.io/f/xvzjoyqv" method="POST">
        <input type="hidden" id="selectedDateInput" name="date" />

        <label for="dateDisplay">چه روزی بریم؟</label>
        <div class="date-picker">
          <button type="button" id="dateDisplay" class="date-display">روز را انتخاب کن</button>

          <div id="calendar" class="calendar hidden">
            <div class="calendar-header">تیر 1405</div>

            <div class="weekdays">
              <div>شنبه</div>
              <div>یکشنبه</div>
              <div>دوشنبه</div>
              <div>سه‌شنبه</div>
              <div>چهارشنبه</div>
              <div>پنجشنبه</div>
              <div>جمعه</div>
            </div>

            <div id="daysGrid" class="days-grid"></div>
          </div>
        </div>

        <label for="place">کجا بریم؟</label>
        <div class="place-hint">مثلا کافه کژوال، کافه لب آب، یه جایی بریم بازی کنیم یا ...</div>
        <input
          type="text"
          id="place"
          name="place"
          placeholder="مثلا کافه کژوال، کافه لب آب، یه جایی بریم بازی کنیم یا ..."
          required
        />

        <label for="plan">دوست داری چیکار کنیم؟</label>
        <select id="plan" name="plan" required>
          <option value="">انتخاب کن</option>
          <option value="coffee">کافی بخوریم</option>
          <option value="dinner">شام بخوریم</option>
          <option value="both">اول کافی بخوریم بعدش شام</option>
          <option value="custom">یه چیزی که خودت میگی</option>
        </select>

        <div id="foodQuestionWrap" class="hidden">
          <label for="foodAnswer" id="foodQuestionLabel"></label>
          <input type="text" id="foodAnswer" name="food" />
        </div>

        <label for="note">اگه چیزی هم خودت دوست داری بنویس، مثلاً ماشین‌گردی، یه جای آروم، پیاده‌روی یا هر چیز دیگه</label>
        <textarea
          id="note"
          name="note"
          placeholder="مثلاً ماشین‌گردی، یه جای آروم، پیاده‌روی، یا هر چیز دیگه‌ای که دوست داری..."
        ></textarea>

        <button type="submit" class="submit-btn">برو تا بریم :)</button>
      </form>

      <div id="result" class="result hidden"></div>
    </div>
  </div>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const buttonsArea = document.getElementById("buttonsArea");
    const questionStep = document.getElementById("questionStep");
    const formStep = document.getElementById("formStep");
    const form = document.getElementById("dateForm");
    const result = document.getElementById("result");

    const planSelect = document.getElementById("plan");
    const foodQuestionWrap = document.getElementById("foodQuestionWrap");
    const foodQuestionLabel = document.getElementById("foodQuestionLabel");
    const foodAnswer = document.getElementById("foodAnswer");

    const dateDisplay = document.getElementById("dateDisplay");
    const calendar = document.getElementById("calendar");
    const daysGrid = document.getElementById("daysGrid");
    const selectedDateInput = document.getElementById("selectedDateInput");

    let selectedDay = "";

    function renderCalendar() {
      const startOffset = 2;
      daysGrid.innerHTML = "";

      for (let i = 0; i < startOffset; i += 1) {
        const emptyCell = document.createElement("div");
        emptyCell.className = "empty-day";
        daysGrid.appendChild(emptyCell);
      }

      for (let day = 1; day <= 31; day += 1) {
        const dayButton = document.createElement("button");
        dayButton.type = "button";
        dayButton.className = "day-btn";
        dayButton.textContent = day;

        if (String(day) === selectedDay) {
          dayButton.classList.add("selected");
        }

        dayButton.addEventListener("click", function () {
          selectedDay = String(day);
          dateDisplay.textContent = day + " تیر 1405";
          selectedDateInput.value = day + " تیر 1405";
          calendar.classList.add("hidden");
          renderCalendar();
        });

        daysGrid.appendChild(dayButton);
      }
    }

    dateDisplay.addEventListener("click", function () {
      calendar.classList.toggle("hidden");
    });

    document.addEventListener("click", function (event) {
      if (!event.target.closest(".date-picker")) {
        calendar.classList.add("hidden");
      }
    });

    yesBtn.addEventListener("click", function () {
      questionStep.classList.add("hidden");
      formStep.classList.remove("hidden");
    });

    planSelect.addEventListener("change", function () {
      const value = planSelect.value;

      if (!value) {
        foodQuestionWrap.classList.add("hidden");
        foodQuestionLabel.textContent = "";
        foodAnswer.value = "";
        foodAnswer.placeholder = "";
        return;
      }

      foodQuestionWrap.classList.remove("hidden");

      if (value === "coffee") {
        foodQuestionLabel.textContent = "چی دوست داری بخوری یا بنوشی؟";
        foodAnswer.placeholder = "مثلاً آیس لاته، هات چاکلت، چیزکیک یا ...";
      } else if (value === "dinner") {
        foodQuestionLabel.textContent = "برای شام چی دوست داری؟";
        foodAnswer.placeholder = "مثلاً پاستا، برگر، پیتزا یا ...";
      } else if (value === "both") {
        foodQuestionLabel.textContent = "برای کافی و شام چی دوست داری؟";
        foodAnswer.placeholder = "مثلاً اول آیس لاته، بعدش پاستا یا ...";
      } else {
        foodQuestionLabel.textContent = "برنامه دلخواهت چیه؟";
        foodAnswer.placeholder = "هر چیزی که دوست داری بنویس...";
      }
    });

    form.addEventListener("submit", async function (event) {
      event.preventDefault();

      if (!selectedDateInput.value) {
        result.classList.remove("hidden");
        result.textContent = "اول تاریخ را انتخاب کن :)";
        return;
      }

      const formData = new FormData(form);

      try {
        const response = await fetch(form.action, {
          method: "POST",
          body: formData,
          headers: {
            Accept: "application/json"
          }
        });

        if (response.ok) {
          form.classList.add("hidden");
          result.classList.remove("hidden");
          result.innerHTML =
            "مرسی خوشگل خانم <br> منتظر دیتمون میمونم 🌻";
        } else {
          result.classList.remove("hidden");
          result.textContent = "ارسال انجام نشد، دوباره امتحان کن.";
        }
      } catch (error) {
        result.classList.remove("hidden");
        result.textContent = "یه مشکلی پیش اومد، دوباره امتحان کن.";
      }
    });

    function moveNoButton() {
      const areaRect = buttonsArea.getBoundingClientRect();
      const buttonRect = noBtn.getBoundingClientRect();

      const maxX = areaRect.width - buttonRect.width;
      const maxY = areaRect.height - buttonRect.height;

      const randomX = Math.max(0, Math.floor(Math.random() * maxX));
      const randomY = Math.max(0, Math.floor(Math.random() * maxY));

      noBtn.style.right = "auto";
      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";
    }

    noBtn.addEventListener("mouseenter", moveNoButton);
    noBtn.addEventListener("click", function (event) {
      event.preventDefault();
      moveNoButton();
    });
    noBtn.addEventListener("touchstart", function (event) {
      event.preventDefault();
      moveNoButton();
    }, { passive: false });

    renderCalendar();
  </script>
</body>
</html>
